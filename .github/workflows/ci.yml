name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Syntax check
        run: python -m py_compile stage1.py stage2step1.py stage2step2.py stage3.py

      - name: Smoke test Stage 3 replay
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/matplotlib
        run: |
          python stage3.py
          test -f stage3_policy_summary.csv
          test -f stage3_ftl_by_type.csv
          test -f stage3_request_results.csv.gz

      - name: Run pytest when tests exist
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/matplotlib
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests/ directory yet; skipping pytest."
          fi
